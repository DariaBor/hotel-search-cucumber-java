name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle Wrapper
        run: ./gradlew build

  sca-ai:
    name: AI SCA
    runs-on: ubuntu-latest

    # Only execute for Pull Requests
    if: github.event_name == 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Download Guard CLI
        env:
          GUARD_API_KEY: ${{ secrets.GUARD_API_KEY }}
        run: |
          curl -kSL \
            -H "X-API-Key: $GUARD_API_KEY" \
            -o /tmp/sf-guard-cli.tgz \
            https://fc-dev.autorabit.com/cli/sf-guard-cli.tgz

      - name: Install Guard CLI
        run: |
          echo y | sf plugins install file:///tmp/sf-guard-cli.tgz

      - name: Run AI SCA Review
        run: |
          sf guard review \
            --check-tests \
            --progress \
            --pr \
            --url "https://fc-dev.autorabit.com" \
            "${{ github.workspace }}"

      - name: Upload Guard Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-ai
          path: .guard/
          if-no-files-found: ignore
